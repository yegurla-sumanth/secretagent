llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
  thinking: true

orchestrate:
  model: together_ai/deepseek-ai/DeepSeek-V3
  max_retries: 3

cachier:
  cache_dir: llm_cache

echo:
  orchestrate: true

evaluate:
  expt_name: object_orchestrated
  result_dir: results
  entry_point: answer_question_workflow

dataset:
  split: object_placements
  shuffle_seed: 42
  n: 4

ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  infer_belief:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: orchestrate
    task_description: >
      Determine where a person would look for an object based on their
      beliefs (theory of mind). You receive a narrative about people moving
      objects, a question about where someone would look, and answer choices.
      Use the available tools to infer what the person believes about the
      object's location, then return the 0-based index of the correct choice.
