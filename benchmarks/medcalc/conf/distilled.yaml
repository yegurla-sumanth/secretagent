# L2: Distilled — try Python calculator, fallback to LLM simulate
llm:
  model: together_ai/Qwen/Qwen3.5-9B
  max_tokens: 16384

cachier:
  cache_dir: llm_cache
  enable_caching: true

evaluate:
  result_dir: results
  expt_name: distilled
  entry_point: calculate_medical_value

dataset:
  split: train
  stratified: true
  n: null
  shuffle_seed: 42

ptools:
  simulate_medical_value:
    method: simulate
  calculate_medical_value:
    method: direct
    fn: ptools.distilled_workflow
