# Auto-composed pipeline: orchestrator generates workflow from available ptools
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

orchestrate:
  model: together_ai/Qwen/Qwen3.5-397B-A17B
  max_retries: 3

cachier:
  cache_dir: llm_cache

echo:
  orchestrate: true

evaluate:
  expt_name: orchestrated
  result_dir: results
  record_details: true

dataset:
  split: test1k
  shuffle_seed: 42
  n: 4

ptools:
  identify_operation:
    method: simulate
  extract_relevant_values:
    method: simulate
  compute_answer:
    method: simulate
  format_answer:
    method: simulate
  # Listed LAST — orchestrator builds catalog from already-implemented ptools
  tabmwp_solve:
    method: orchestrate
    task_description: >
      Solve a tabular math word problem. You receive a question, a
      pipe-delimited table, and optionally a list of answer choices.
      Identify the operation, extract relevant values from the table,
      compute the answer, and format it. Return the answer as a string.
