# Option A: hand-coded workflow, table in-context
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache

evaluate:
  expt_name: workflow_incontext
  result_dir: results
  record_details: true

dataset:
  split: test1k
  shuffle_seed: 42
  n: 4

ptools:
  identify_operation:
    method: simulate
  extract_relevant_values:
    method: simulate
  compute_answer:
    method: simulate
  format_answer:
    method: simulate
  tabmwp_solve:
    method: direct
    fn: ptools.incontext_workflow
