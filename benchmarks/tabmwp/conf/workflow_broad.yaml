# 2-step workflow: extract_and_compute -> format_answer
# Tests hypothesis: fewer, broader ptools reduce error propagation
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache

evaluate:
  expt_name: workflow_broad
  result_dir: results
  record_details: true

dataset:
  split: test1k
  shuffle_seed: 42
  n: 4

ptools:
  extract_and_compute:
    method: simulate
  format_answer:
    method: simulate
  tabmwp_solve:
    method: direct
    fn: ptools.broad_workflow
