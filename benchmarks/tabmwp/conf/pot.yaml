# Program of Thought: LLM generates Python code
# Uses tabmwp_solve_pot which receives table as pandas-ready dict
# instead of pipe-delimited text, so generated code can do
# pd.DataFrame(table_for_pd) directly.
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache

evaluate:
  expt_name: pot
  result_dir: results
  record_details: true

dataset:
  split: test1k
  shuffle_seed: 42
  n: 4

ptools:
  tabmwp_solve_pot:
    method: program_of_thought
  tabmwp_solve:
    method: direct
    fn: ptools.pot_workflow
